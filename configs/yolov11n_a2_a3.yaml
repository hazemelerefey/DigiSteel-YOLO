# YOLOv11n with GhostConv + Inner-WIoU: Lightweight Variant
# NEU-DET dataset

path: datasets/NEU-DET/yolo
train: images/train
val: images/val
test: images/test

nc: 6
names:
  0: crazing
  1: inclusion
  2: patches
  3: pitted_surface
  4: rolled-in_scale
  5: scratches

# Lightweight variant configuration:
# - GhostConv backbone (Han et al., CVPR 2020) for parameter reduction
# - Inner-WIoU loss (Zhang 2023 + Tong 2023) for improved box regression
#
# Both modifications are applied in the training script (scripts/train_a2_a3.py).
# This variant is evaluated as part of the robustness study.
