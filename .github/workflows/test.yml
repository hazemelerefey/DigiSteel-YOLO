name: Tests & Linting

on:
  push:
    branches: [main, develop, "feat/*"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[dev]

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Format check with black
        run: |
          black --check .

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=digisteel --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  smoke-test:
    runs-on: ubuntu-latest
    needs: test
    # Optional: run only if you have GPU quota
    # runs-on: [self-hosted, gpu]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download tiny dataset
        run: |
          # Optional: download a 50-image subset of NEU-DET for smoke testing
          # For now, just verify the scripts exist and can be imported
          python -c "from digisteel.modules import ghost_conv; print('Imports OK')"

      - name: Smoke test (verify config parsing)
        run: |
          python -c "
import yaml
with open('configs/yolov11n_baseline.yaml', 'r') as f:
    cfg = yaml.safe_load(f)
    print('Config loads OK:', cfg.get('path', 'path key missing'))
          "
